name: Push to GitHub Container Registry

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag version to use if triggered manually'
        required: true
        default: 'latest'
  push:
    tags:
      - '*'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Set build arguments
        env:
          REPOSITORY_URI: ghcr.io/${{ github.repository_owner }}/story
        run: |
          echo "REPOSITORY_URI=$REPOSITORY_URI" >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
          fi
          echo "BUILDNUM=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Dockerize the story-node binary
        env:
          DOCKER_BUILDKIT: 1
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg BUILDNUM=$BUILDNUM \
            --build-arg COMMIT=$COMMIT \
            --build-arg VERSION=$VERSION \
            -t $REPOSITORY_URI:latest \
            -t $REPOSITORY_URI:$COMMIT \
            -t $REPOSITORY_URI:$VERSION \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            -f ./Dockerfile \
            .
